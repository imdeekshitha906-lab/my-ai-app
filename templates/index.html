<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>{{ app_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Karla:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --base:#FAF4F7; --card:#fff; --ink:#332030; --soft:#7A6375;
    --rose:#A64D7E; --rose-deep:#7E3560; --rose-tint:#F3E3EC;
    --tulsi:#5F7F63; --line:#EBDCE4;
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--base); color:var(--ink); font-family:'Karla',system-ui,sans-serif; display:flex; flex-direction:column; height:100dvh}
  header{padding:16px; text-align:center; border-bottom:1px solid var(--line); background:var(--card)}
  header h1{font-family:'Fraunces',serif; font-size:24px; font-weight:650}
  header h1 span{color:var(--rose)}
  header p{color:var(--soft); font-size:12.5px; margin-top:2px}
  .modes{display:flex; gap:8px; justify-content:center; padding:12px 16px}
  .modes button{padding:9px 16px; border-radius:20px; border:1.5px solid var(--line); background:var(--card); color:var(--soft); font-family:inherit; font-weight:600; font-size:13px; cursor:pointer}
  .modes button.on{background:var(--rose-tint); border-color:var(--rose); color:var(--rose-deep)}
  main{flex:1; overflow-y:auto; padding:8px 16px; max-width:640px; width:100%; margin:0 auto}
  .bubble{max-width:86%; padding:11px 15px; border-radius:15px; font-size:14.5px; line-height:1.55; white-space:pre-wrap; margin-bottom:10px}
  .user{margin-left:auto; background:var(--rose); color:#fff}
  .ai{margin-right:auto; background:var(--card); border:1px solid var(--line)}
  .starters{display:grid; gap:8px; margin-top:12px}
  .starters button{text-align:left; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:inherit; font-size:13.5px; cursor:pointer}
  footer{padding:10px 16px calc(10px + env(safe-area-inset-bottom)); background:var(--card); border-top:1px solid var(--line)}
  .row{display:flex; gap:8px; max-width:640px; margin:0 auto}
  input{flex:1; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line); background:#FDFAFB; font-size:14px; font-family:inherit; color:var(--ink); outline:none}
  input:focus{border-color:var(--rose)}
  .send{padding:0 18px; border-radius:12px; border:none; background:var(--rose); color:#fff; font-weight:700; cursor:pointer; font-family:inherit; font-size:16px}
  .disclaimer{text-align:center; font-size:10.5px; color:var(--soft); margin-top:6px}
</style>
</head>
<body>
<header>
  <h1>{{ app_name }} <span>·</span></h1>
  <p>{{ tagline }}</p>
</header>

<div class="modes">
  <button id="m-partner" class="on" onclick="setMode('partner')">I love an avoidant</button>
  <button id="m-avoidant" onclick="setMode('avoidant')">I am the avoidant</button>
</div>

<main id="chat">
  <div class="starters" id="starters"></div>
</main>

<footer>
  <div class="row">
    <input id="input" placeholder="Type your message…" onkeydown="if(event.key==='Enter')send()" />
    <button class="send" onclick="send()">→</button>
  </div>
  <div class="disclaimer">A coaching companion, not therapy. In crisis? iCall 9152987821 · RCI counsellors near you.</div>
</footer>

<script>
let mode = "partner";
let msgs = [];

const STARTERS = {
  partner: [
    "Why does he go silent right after our best days together?",
    "How do I ask for more time without pushing her away?",
    "Is it wrong that I feel lonely in this relationship?"
  ],
  avoidant: [
    "I suddenly find flaws in my partner when things get serious. Why?",
    "How do I tell them I need space without hurting them?",
    "I want to change but opening up feels impossible."
  ]
};

function setMode(m) {
  mode = m; msgs = [];
  document.getElementById("m-partner").classList.toggle("on", m === "partner");
  document.getElementById("m-avoidant").classList.toggle("on", m === "avoidant");
  document.getElementById("chat").innerHTML = '<div class="starters" id="starters"></div>';
  renderStarters();
}

function renderStarters() {
  const box = document.getElementById("starters");
  if (!box) return;
  box.innerHTML = "";
  STARTERS[mode].forEach(s => {
    const b = document.createElement("button");
    b.textContent = s;
    b.onclick = () => send(s);
    box.appendChild(b);
  });
}

function bubble(text, who) {
  const d = document.createElement("div");
  d.className = "bubble " + who;
  d.textContent = text;
  document.getElementById("chat").appendChild(d);
  d.scrollIntoView({ behavior: "smooth" });
  return d;
}

async function send(preset) {
  const input = document.getElementById("input");
  const content = (preset || input.value).trim();
  if (!content) return;
  input.value = "";
  document.getElementById("starters")?.remove();
  bubble(content, "user");
  msgs.push({ role: "user", content });
  const t = bubble("typing…", "ai");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode, messages: msgs })
    });
    const data = await res.json();
    if (data.error) { t.textContent = "⚠ " + data.error; msgs.pop(); return; }
    t.textContent = data.reply;
    msgs.push({ role: "assistant", content: data.reply });
  } catch {
    t.textContent = "⚠ Connection problem — try again.";
    msgs.pop();
  }
}

renderStarters();
</script>
</body>
</html>
